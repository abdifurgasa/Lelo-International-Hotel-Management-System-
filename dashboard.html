<!DOCTYPE html>
<html>

<head>
<title>Lelo International Hotel Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/dashboard.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="sidebar">

<h2>Lelo Hotel</h2>

<ul>
<li onclick="location.reload()">Dashboard</li>
<li>Rooms</li>
<li>Booking</li>
<li>Restaurant</li>
<li>Drinks</li>
<li>Billing</li>
<li id="logout">Logout</li>
</ul>

</div>

<div class="main">

<div class="topbar">
<h2>Enterprise Dashboard</h2>
</div>

<div class="cards">

<div class="card rooms">
<h3>Rooms</h3>
<p id="roomCount">0</p>
</div>

<div class="card booking">
<h3>Booking</h3>
<p id="bookingCount">0</p>
</div>

<div class="card food">
<h3>Restaurant</h3>
<p id="foodCount">0</p>
</div>

<div class="card drink">
<h3>Drinks</h3>
<p id="drinkCount">0</p>
</div>

<div class="card billing">
<h3>Billing</h3>
<p id="billingCount">0</p>
</div>

<div class="card revenue">
<h3>Revenue</h3>
<canvas id="revenueChart"></canvas>
</div>

</div>

</div>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
